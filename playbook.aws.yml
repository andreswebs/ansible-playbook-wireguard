#!/usr/bin/env ansible-playbook
---
- name: Deploy wireguard (AWS via SSM)
  hosts: "{{ custom_hosts | default('vm_tag_wireguard') }}"
  vars:
    ansible_connection: aws_ssm
    ssm_timeout: 60
  become: true
  become_user: root

  tasks:
    - name: Upgrade system
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        autoremove: true
        autoclean: true
      async: 3600
      poll: 5
      when: upgrade_system | default(false) | bool
      tags:
        - system

    - name: Deploy wireguard via docker_app role
      ansible.builtin.import_role:
        name: andreswebs.docker_app
      vars:
        app_name: wireguard
        app_src: files/
        app_dest: /opt/wireguard

    - name: Check if a reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required
      changed_when: reboot_required.stat.exists
      notify:
        - Reboot
      tags:
        - system

  handlers:
    - name: Reboot
      ansible.builtin.reboot:
        msg: Maintenance reboot initiated
