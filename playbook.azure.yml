#!/usr/bin/env ansible-playbook
---
- name: Generate az ssh config for Azure targets
  hosts: "{{ custom_hosts | default('vm_tag_wireguard') }}"
  gather_facts: false
  connection: local
  become: false

  tasks:
    - name: Resolve VM resource group from inventory
      ansible.builtin.assert:
        that:
          - resource_group is defined
        fail_msg: >-
          azure_rm inventory must expose `resource_group` on the host; check
          the plugin output with `ansible-inventory -i inventory/azure_rm.yml --host {{ inventory_hostname }}`.

    - name: Generate ./.az-ssh-config
      ansible.builtin.command:
        cmd: >-
          az ssh config
          --resource-group {{ resource_group }}
          --name {{ name }}
          --file {{ playbook_dir }}/.az-ssh-config
          --overwrite
      delegate_to: localhost
      run_once: true
      changed_when: true

- name: Deploy wireguard (Azure via az ssh / AAD)
  hosts: "{{ custom_hosts | default('vm_tag_wireguard') }}"
  vars:
    ansible_connection: ssh
    ansible_ssh_common_args: "-F {{ playbook_dir }}/.az-ssh-config"
  become: true
  become_user: root

  tasks:
    - name: Upgrade system
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        autoremove: true
        autoclean: true
      async: 3600
      poll: 5
      when: upgrade_system | default(false) | bool
      tags:
        - system

    - name: Deploy wireguard via docker_app role
      ansible.builtin.import_role:
        name: andreswebs.docker_app
      vars:
        app_name: wireguard
        app_src: files/
        app_dest: /opt/wireguard

    - name: Check if a reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required
      changed_when: reboot_required.stat.exists
      notify:
        - Reboot
      tags:
        - system

  handlers:
    - name: Reboot
      ansible.builtin.reboot:
        msg: Maintenance reboot initiated
